<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Report a Bug – Heda</title>
  <style>
    :root {
      --bg-color: #121212;
      --text-color: #e0e0e0;
      --card-bg: #1e1e1e;
      --card-border: #2a2a2a;
      --logo-color: #a78be0;
      --tagline-color: #555;
      --heading-color: #e0e0e0;
      --paragraph-color: #aaa;
      --info-bg: #252525;
      --info-border: #333;
      --info-text: #ccc;
      --info-strong: #fff;
      --btn-bg: #3a1a6a;
      --btn-border: #6a3fa0;
      --btn-text: #c4abf5;
      --btn-hover-bg: #4a2080;
      --btn-hover-border: #a78be0;
      --btn-hover-text: #d4c0ff;
      --note-color: #555;
      --hr-color: #2a2a2a;
      --footer-color: #444;
      --footer-link: #444;
      --footer-link-hover: #a78be0;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg-color: #f5f5f5;
        --text-color: #333333;
        --card-bg: #ffffff;
        --card-border: #e0e0e0;
        --logo-color: #6a3fa0;
        --tagline-color: #666;
        --heading-color: #2c3e50;
        --paragraph-color: #555;
        --info-bg: #f3f0fa;
        --info-border: #d1c4f0;
        --info-text: #444;
        --info-strong: #2c3e50;
        --btn-bg: #8b5dc8;
        --btn-border: #6a3fa0;
        --btn-text: #ffffff;
        --btn-hover-bg: #6a3fa0;
        --btn-hover-border: #4a2080;
        --btn-hover-text: #ffffff;
        --note-color: #666;
        --hr-color: #ddd;
        --footer-color: #777;
        --footer-link: #777;
        --footer-link-hover: #8b5dc8;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.1);
      max-width: 520px;
      width: 100%;
      padding: 40px 36px 32px;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      color: var(--logo-color);
      margin-bottom: 4px;
    }

    .tagline {
      font-size: 13px;
      color: var(--tagline-color);
      margin-bottom: 28px;
    }

    h1 {
      font-size: 20px;
      color: var(--heading-color);
      margin-bottom: 12px;
    }

    .icon { font-size: 32px; margin-bottom: 16px; display: block; }

    p {
      color: var(--paragraph-color);
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 14px;
    }

    .info-box {
      background: var(--info-bg);
      border: 1px solid var(--info-border);
      border-radius: 8px;
      padding: 16px 20px;
      margin: 24px 0;
      font-size: 14px;
      color: var(--info-text);
      line-height: 1.8;
    }

    .info-box strong { color: var(--info-strong); }

    .note {
      font-size: 12px;
      color: var(--note-color);
      margin-top: 20px;
      line-height: 1.6;
    }

    .form-iframe {
      width: 100%;
      min-height: 900px;
      border: none;
      border-radius: 8px;
      background: transparent;
      margin-top: 8px;
    }

    hr { border: none; border-top: 1px solid var(--hr-color); margin: 28px 0; }

    footer {
      margin-top: 32px;
      font-size: 12px;
      color: var(--footer-color);
      text-align: center;
    }

    footer a { color: var(--footer-link); text-decoration: none; }
    footer a:hover { color: var(--footer-link-hover); }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">Heda</div>
    <div style="display: flex; align-items: center;">
      <div class="tagline">by EXSports Oy</div>
    </div>

    <div class="info-box">
      <strong>Bug report form coming soon.</strong><br/>
      In the meantime, please report bugs via email: <a href="mailto:info@exsports.fi">info@exsports.fi</a>
    </div>

    <!-- TODO: Replace the placeholder above with the Google Form iframe once the Bug Report form is created -->
    <!--
    <iframe
      class="form-iframe"
      src="GOOGLE_FORM_URL_HERE"
      title="Bug Report Form"
    >Loading form…</iframe>
    -->
  </div>

  <footer>
    &copy; 2026 EXSports Oy &nbsp;|&nbsp;
    <a href="../index.html">← Back</a>
  </footer>

</body>
</html>
