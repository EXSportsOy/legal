<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Legal – SurveyTools by EXSports Oy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 16px rgba(26,86,160,0.10);
      max-width: 480px;
      width: 100%;
      padding: 40px 36px 32px;
      text-align: center;
    }
    .logo {
      font-size: 28px;
      font-weight: bold;
      color: #1a56a0;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .tagline {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
    }
    h1 {
      font-size: 18px;
      color: #444;
      margin-bottom: 24px;
      font-weight: normal;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #f0f5ff;
      border: 1px solid #d0e0f7;
      border-radius: 8px;
      padding: 16px 20px;
      text-decoration: none;
      color: #1a56a0;
      font-size: 16px;
      font-weight: bold;
      transition: background 0.15s, border-color 0.15s;
    }
    .link-btn:hover {
      background: #ddeeff;
      border-color: #1a56a0;
    }
    .link-btn .icon {
      font-size: 24px;
      flex-shrink: 0;
    }
    .link-btn .desc {
      font-size: 12px;
      font-weight: normal;
      color: #666;
      margin-top: 2px;
    }
    .link-btn .text { text-align: left; }
    footer {
      margin-top: 32px;
      font-size: 12px;
      color: #bbb;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">SurveyTools</div>
    <div class="tagline">by EXSports Oy</div>

    <h1>Legal Documents</h1>

    <div class="links">
      <a class="link-btn" href="privacy_policy.html">
        <span class="icon">🔒</span>
        <div class="text">
          Privacy Policy
          <div class="desc">How we collect, use and protect your data</div>
        </div>
      </a>
      <a class="link-btn" href="disclaimer.html">
        <span class="icon">⚠️</span>
        <div class="text">
          Disclaimer
          <div class="desc">Limitation of liability and terms of use</div>
        </div>
      </a>
    </div>
  </div>

  <footer>
    &copy; 2026 EXSports Oy &nbsp;|&nbsp;
    <a href="mailto:info@exsports.fi" style="color:#bbb;">info@exsports.fi</a>
  </footer>

</body>
</html>
