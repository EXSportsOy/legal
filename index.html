    body {

      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: #1e1e1e;

      margin-bottom: 24px;
      font-weight: normal;

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #252525;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 16px 20px;
      text-decoration: none;
      color: #90bdf7;
      font-size: 15px;
      font-weight: bold;
      transition: background 0.15s, border-color 0.15s;
    }
    .link-btn:hover {
      background: #2a2a3a;
      border-color: #64a8f0;
      color: #64a8f0;
    }
    .link-btn .icon { font-size: 22px; flex-shrink: 0; }
    .link-btn .desc {
      font-size: 12px;
      font-weight: normal;
      color: #666;
      margin-top: 2px;
    }
    .link-btn .text { text-align: left; }
    footer {
      margin-top: 32px;
      font-size: 12px;
      color: #444;
      text-align: center;
    }
    footer a { color: #444; text-decoration: none; }
    footer a:hover { color: #64a8f0; }

</head>
